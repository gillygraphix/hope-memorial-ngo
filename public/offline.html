<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>No Internet Connection</title>
    <style>
        body { margin: 0; padding: 0; background-color: #0f172a; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; text-align: center; }
        .icon { width: 80px; height: 80px; background: rgba(234, 88, 12, 0.2); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-bottom: 20px; color: #ea580c; }
        .icon svg { width: 40px; height: 40px; }
        h1 { font-size: 24px; margin-bottom: 10px; letter-spacing: 1px; }
        /* HAPA NDIPO PALIPOKUWA NA SHIDA, NIMEWEKA max-width: 320px; */
        p { color: #94a3b8; max-width: 320px; margin: 0 auto 30px auto; line-height: 1.5; font-size: 15px; }
        button { background-color: #ea580c; color: white; border: none; padding: 12px 30px; border-radius: 30px; font-weight: bold; font-size: 14px; text-transform: uppercase; cursor: pointer; letter-spacing: 1px; box-shadow: 0 4px 15px rgba(234, 88, 12, 0.3); }
    </style>
</head>
<body>
    <div class="icon">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3 3l18 18M9.9 4.1C11.2 3.4 12.6 3 14 3c4.4 0 8.3 2 10.9 5l-1.3 1.6M1 8l1.3-1.6C4.4 3.9 8.2 2 12.5 2c1.6 0 3.2.4 4.6 1.1M16 12a4 4 0 01-8 0"/></svg>
    </div>
    <h1>You are Offline</h1>
    <p>It seems there's a problem with your connection. Please check your network and try again.</p>
    <button onclick="window.location.reload()">Try Again</button>
</body>
</html>
